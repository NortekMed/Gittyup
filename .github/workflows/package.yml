---
name: GitNortek Packages

on:
  push:
    tags:
    - 'v*.*.*-pre*'

env:
  TAG_PATTERN: '^v[0-9]+\.[0-9]+\.[0-9]+-pre\.?[0-9]+$'

jobs:
  rpm:
    name: Fedora RPM
    runs-on: ubuntu-latest
    container: fedora:42
    steps:
    - name: Validate tag
      run: |
        if [[ ! "${GITHUB_REF_NAME}" =~ ${TAG_PATTERN} ]]; then
          echo "Tag '${GITHUB_REF_NAME}' does not match expected format vX.Y.Z-preN or vX.Y.Z-pre.N."
          exit 1
        fi

    - name: Install build dependencies
      run: |
        dnf -y update
        dnf -y install \
          appstream \
          cmake \
          gcc-c++ \
          git \
          libssh2-devel \
          ninja-build \
          openssl-devel \
          pkgconf-pkg-config \
          qt6-qtbase-devel \
          qt6-qttools-devel \
          qt6-qttranslations \
          rpm-build

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Configure
      run: >
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release
        -DGITTYUP_LINUX_PACKAGE_GENERATOR=RPM
        -DGENERATE_APPDATA=ON
        -DCMAKE_INSTALL_PREFIX=/usr
        -DENABLE_UPDATE_OVER_GUI=OFF
        -S . -B build/release

    - name: Build RPM
      run: ninja -C build/release package

    - name: Upload RPM
      uses: actions/upload-artifact@v6
      with:
        name: GitNortek-RPM
        path: build/release/pack/*.rpm
        if-no-files-found: error

  windows-exe:
    name: Windows EXE
    runs-on: windows-2022
    steps:
    - name: Validate tag
      shell: bash
      run: |
        if [[ ! "${GITHUB_REF_NAME}" =~ ${TAG_PATTERN} ]]; then
          echo "Tag '${GITHUB_REF_NAME}' does not match expected format vX.Y.Z-preN or vX.Y.Z-pre.N."
          exit 1
        fi

    - name: Set git name and email
      run: |
        git config --global user.name "Your Name"
        git config --global user.email "youremail@yourdomain.com"

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install Perl
      uses: shogo82148/actions-setup-perl@v1
      with:
        perl-version: '5.30'

    - name: Install Qt
      uses: jurplel/install-qt-action@v4.3.0
      timeout-minutes: 10
      with:
        version: 6.7.3
        target: desktop
        host: windows
        arch: win64_msvc2019_64
        install-deps: true
        modules: qtwebengine

    - name: Install Ninja
      uses: seanmiddleditch/gha-setup-ninja@v6
      with:
        version: 1.11.1
        platform: win
        destination: ninja

    - name: Setup MSVC environment
      uses: seanmiddleditch/gha-setup-vsdevenv@v5
      with:
        arch: x64

    - name: Install NASM
      uses: ilammy/setup-nasm@v1.2.0

    - name: Install NSIS for CPack
      shell: pwsh
      run: |
        choco install nsis -y
        $nsis = @(
          'C:\Program Files (x86)\NSIS',
          'C:\Program Files\NSIS'
        ) | Where-Object { Test-Path $_ } | Select-Object -First 1
        if ($nsis) { Add-Content $env:GITHUB_PATH $nsis }

    - name: Build OpenSSL
      run: |
        cd dep/openssl/openssl
        perl Configure VC-WIN64A
        nmake

    - name: Configure
      env:
        CMAKE_RC_FLAGS: /C 1252
      run: >
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release
        -DUSE_SYSTEM_QT=OFF
        -DUSE_SYSTEM_LIBSSH2=OFF
        -DUSE_BUNDLED_ZLIB=1
        -DUSE_SSH:STRING=localbuild
        -DUSE_SYSTEM_OPENSSL=OFF
        -DCMAKE_C_COMPILER=cl
        -DCMAKE_CXX_COMPILER=cl
        -S . -B build/release

    - name: Build EXE installer
      run: ninja -C build/release package

    - name: Upload EXE
      uses: actions/upload-artifact@v6
      with:
        name: GitNortek-Windows-Installer
        path: build/release/pack/*.exe
        if-no-files-found: error

  release:
    name: GitHub Release
    needs: [rpm, windows-exe]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Validate tag
      run: |
        if [[ ! "${GITHUB_REF_NAME}" =~ ${TAG_PATTERN} ]]; then
          echo "Tag '${GITHUB_REF_NAME}' does not match expected format vX.Y.Z-preN or vX.Y.Z-pre.N."
          exit 1
        fi

    - name: Download artifacts
      uses: actions/download-artifact@v6
      with:
        path: artifacts

    - name: Create or update GitHub release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        shopt -s nullglob

        tag="${GITHUB_REF_NAME}"
        rpms=(artifacts/GitNortek-RPM/*.rpm)
        installers=(artifacts/GitNortek-Windows-Installer/*.exe)
        files=("${rpms[@]}" "${installers[@]}")

        if [ ${#rpms[@]} -eq 0 ]; then
          echo "No RPM asset to upload."
          exit 1
        fi

        if [ ${#installers[@]} -eq 0 ]; then
          echo "No Windows installer asset to upload."
          exit 1
        fi

        if ! gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
          gh release create "$tag" \
            --repo "${{ github.repository }}" \
            --prerelease \
            --title "GitNortek $tag" \
            --target "${{ github.sha }}" \
            "${files[@]}"
        else
          gh release edit "$tag" \
            --repo "${{ github.repository }}" \
            --prerelease \
            --title "GitNortek $tag"
          gh release upload "$tag" "${files[@]}" \
            --repo "${{ github.repository }}" \
            --clobber
        fi
