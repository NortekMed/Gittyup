---
name: Package Artifacts

on:
  push:
    branches:
    - master
    - main
  pull_request:
  workflow_dispatch:

jobs:
  rpm:
    name: Fedora RPM
    runs-on: ubuntu-latest
    container: fedora:42
    steps:
    - name: Install build dependencies
      run: |
        dnf -y update
        dnf -y install \
          appstream \
          cmake \
          gcc-c++ \
          git \
          libssh2-devel \
          ninja-build \
          openssl-devel \
          pkgconf-pkg-config \
          qt6-qtbase-devel \
          qt6-qttools-devel \
          qt6-qttranslations \
          rpm-build

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Configure
      run: >
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release
        -DGITTYUP_LINUX_PACKAGE_GENERATOR=RPM
        -DGENERATE_APPDATA=ON
        -DCMAKE_INSTALL_PREFIX=/usr
        -DENABLE_UPDATE_OVER_GUI=OFF
        -S . -B build/release

    - name: Build RPM
      run: ninja -C build/release package

    - name: Upload RPM
      uses: actions/upload-artifact@v6
      with:
        name: Gittyup RPM
        path: build/release/pack/*.rpm
        if-no-files-found: error

  windows-exe:
    name: Windows EXE
    runs-on: windows-latest
    steps:
    - name: Set git name and email
      run: |
        git config --global user.name "Your Name"
        git config --global user.email "youremail@yourdomain.com"

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install Perl
      uses: shogo82148/actions-setup-perl@v1
      with:
        perl-version: '5.30'

    - name: Install Qt
      uses: jurplel/install-qt-action@v4.3.0
      timeout-minutes: 10
      with:
        version: 6.6.0
        target: desktop
        host: windows
        arch: win64_msvc2019_64
        install-deps: true
        modules: qtwebengine

    - name: Install Ninja
      uses: seanmiddleditch/gha-setup-ninja@v6
      with:
        version: 1.11.1
        platform: win
        destination: ninja

    - name: Setup MSVC environment
      uses: seanmiddleditch/gha-setup-vsdevenv@v5
      with:
        arch: x64

    - name: Install NASM
      uses: ilammy/setup-nasm@v1.2.0

    - name: Install NSIS for CPack
      shell: pwsh
      run: |
        choco install nsis -y
        $nsis = @(
          'C:\Program Files (x86)\NSIS',
          'C:\Program Files\NSIS'
        ) | Where-Object { Test-Path $_ } | Select-Object -First 1
        if ($nsis) { Add-Content $env:GITHUB_PATH $nsis }

    - name: Build OpenSSL
      run: |
        cd dep/openssl/openssl
        perl Configure VC-WIN64A
        nmake

    - name: Configure
      env:
        CMAKE_RC_FLAGS: /C 1252
      run: >
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release
        -DUSE_SYSTEM_QT=OFF
        -DUSE_SYSTEM_LIBSSH2=OFF
        -DUSE_BUNDLED_ZLIB=1
        -DUSE_SSH:STRING=localbuild
        -DUSE_SYSTEM_OPENSSL=OFF
        -DCMAKE_C_COMPILER=cl
        -DCMAKE_CXX_COMPILER=cl
        -S . -B build/release

    - name: Build EXE installer
      run: ninja -C build/release package

    - name: Upload EXE
      uses: actions/upload-artifact@v6
      with:
        name: Gittyup Windows Installer
        path: build/release/pack/*.exe
        if-no-files-found: error
